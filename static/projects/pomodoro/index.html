        #decrease-time {

        /* Background changer button */
        #background-changer {

            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;

        #background-changer:hover {

<body>

    <div id="app">

    <hr style="border: 1px solid rgb(115, 153, 115);">

    <div id="app" style="text-align: left; padding-top: 4px; padding-bottom: 4px; font-size: 0.85em; ">
        <blockquote style="margin-top: 8px; margin-bottom: 4px; color: #8ec07c;">

    <script>
        let minutes = 25;
        let seconds = 0;
        let timerInterval;
        let pomodoroCount = 0;
        let isTimerRunning = false;

        const minutesElement = document.getElementById('minutes');
        const secondsElement = document.getElementById('seconds');
        const toggleTimerButton = document.getElementById('toggle-timer');
        const resetButton = document.getElementById('reset');
        const toDoList = document.getElementById('to-do-list');
        const addTaskButton = document.getElementById('add-task');
        const newTaskInput = document.getElementById('new-task');
        const backgroundAudio = document.getElementById('background-audio');
        const toggleMusicButton = document.getElementById('toggle-music');
        const currentTaskElement = document.getElementById('current-task');
        const pomodoroCountElement = document.getElementById('pomodoro-count');
        const audioSelect = document.getElementById('audio-select');
        const decreaseTimeButton = document.getElementById('decrease-time');
        const increaseTimeButton = document.getElementById('increase-time');
        const backgroundChanger = document.getElementById('background-changer');

        // Array of background images
        const backgroundImages = [
            'ThinkingPlace.webp',
            'ThinkingPlace1.webp',
            'ThinkingPlace2.webp'
        ];

        let currentBackgroundIndex = 0;

        // Function to change background
        function changeBackground() {
            currentBackgroundIndex = (currentBackgroundIndex + 1) % backgroundImages.length;
            document.body.style.backgroundImage = `url('${backgroundImages[currentBackgroundIndex]}')`;

            // Save to localStorage
            localStorage.setItem('pomodoroBackground', currentBackgroundIndex);
        }

        // Load background preference from localStorage
        document.addEventListener('DOMContentLoaded', function() {
            loadTasks();

            const savedBackgroundIndex = localStorage.getItem('pomodoroBackground');
            if (savedBackgroundIndex !== null) {
                currentBackgroundIndex = parseInt(savedBackgroundIndex);
                document.body.style.backgroundImage = `url('${backgroundImages[currentBackgroundIndex]}')`;
            }
        });

        window.addEventListener('beforeunload', (e) => {
            if (isTimerRunning) {
                e.preventDefault();
                e.returnValue = 'Your timer is still running! Are you sure you want to leave?';
                return 'Your timer is still running! Are you sure you want to leave?';
            }
        });

        // Save tasks to localStorage
        function saveTasks() {
            const tasks = [];
            const taskElements = toDoList.querySelectorAll('li');

            taskElements.forEach(taskElement => {
                const taskText = taskElement.querySelector('.task-content span:nth-child(2)').textContent;
                const taskTime = taskElement.querySelector('.task-time').textContent;
                tasks.push({ text: taskText, time: taskTime });
            });

            localStorage.setItem('pomodoroTasks', JSON.stringify(tasks));
        }

        // Load tasks from localStorage
        function loadTasks() {
            const savedTasks = localStorage.getItem('pomodoroTasks');
            if (savedTasks) {
                const tasks = JSON.parse(savedTasks);
                tasks.forEach(task => {
                    createTaskElement(task.text, task.time);
                });
                updateTaskNumbers();
            }
        }

        function createTaskElement(taskText, taskTime = null) {
            const taskItem = document.createElement('li');
            const contentDiv = document.createElement('div');
            contentDiv.className = 'task-content';

            const numberSpan = document.createElement('span');
            numberSpan.className = 'task-number';

            const taskSpan = document.createElement('span');
            taskSpan.textContent = taskText;

            const timeSpan = document.createElement('span');
            timeSpan.className = 'task-time';

            if (taskTime) {
                timeSpan.textContent = taskTime;
            } else {
                const now = new Date();
                timeSpan.textContent = now.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: false
                });
            }

            const deleteButton = document.createElement('button');
            deleteButton.textContent = '×';
            deleteButton.classList.add('delete-task');
            deleteButton.addEventListener('click', (e) => {
                e.stopPropagation();
                taskItem.remove();
                updateTaskNumbers();
                saveTasks(); // Save after deletion
            });

            taskItem.addEventListener('click', () => {
                currentTaskElement.textContent = `⌛  ${taskText}`;
            });

            contentDiv.appendChild(numberSpan);
            contentDiv.appendChild(taskSpan);
            contentDiv.appendChild(timeSpan);
            taskItem.appendChild(contentDiv);
            taskItem.appendChild(deleteButton);
            toDoList.appendChild(taskItem);

            return taskItem;
        }

        function updateTaskNumbers() {
            const tasks = toDoList.children;
            for (let i = 0; i < tasks.length; i++) {
                const taskNumber = tasks[i].querySelector('.task-number');
                if (taskNumber) {
                    taskNumber.textContent = `${i + 1}.`;
                }
            }
        }

        function addTask() {
            const taskText = newTaskInput.value.trim();
            if (!taskText) {
                alert('Please enter a task name');
                return;
            }

            try {
                createTaskElement(taskText);
                updateTaskNumbers();
                newTaskInput.value = '';
                newTaskInput.focus();
                saveTasks(); // Save after adding
            } catch (error) {
                console.error('Error adding task:', error);
                alert('Failed to add task. Please try again.');
            }
        }

        function updateDisplay() {
            minutesElement.textContent = String(minutes).padStart(2, '0');
            secondsElement.textContent = String(seconds).padStart(2, '0');
        }

        function updateTimer() {
            seconds--;
            if (seconds < 0) {
                seconds = 59;
                minutes--;
            }

            if (minutes < 0) {
                clearInterval(timerInterval);
                alert('Pomodoro complete!');
                pomodoroCount++;
                pomodoroCountElement.textContent = `Pomodoros Completed: ${pomodoroCount}`;
                resetTimer();
                return;
            }

            updateDisplay();
        }

        function toggleTimer() {
            if (isTimerRunning) {
                backgroundAudio.pause();
                clearInterval(timerInterval);
                toggleTimerButton.textContent = 'Start';
                toggleTimerButton.style.backgroundColor = '#b8bb26';
            } else {
                backgroundAudio.play().catch(error => {
                    console.error('Audio playback failed:', error);
                    alert('Error playing audio. Please interact with the page first.');
                });
                timerInterval = setInterval(updateTimer, 1000);
                toggleTimerButton.textContent = 'Pause';
                toggleTimerButton.style.backgroundColor = '#98971a';
            }
            isTimerRunning = !isTimerRunning;
        }

        function resetTimer() {
            backgroundAudio.pause();
            clearInterval(timerInterval);
            minutes = 25;
            seconds = 0;
            updateDisplay();
            toggleTimerButton.textContent = 'Start';
            toggleTimerButton.style.backgroundColor = '#b8bb26';
            isTimerRunning = false;
        }

        function toggleMusic() {
            if (backgroundAudio.paused) {
                backgroundAudio.play().catch(error => {
                    console.error('Audio playback failed:', error);
                    alert('Error playing audio. Please interact with the page first.');
                });
                toggleMusicButton.textContent = 'Pause Music';
                toggleMusicButton.style.backgroundColor = '#076678';
            } else {
                backgroundAudio.pause();
                toggleMusicButton.textContent = 'Play Music';
                toggleMusicButton.style.backgroundColor = '#458588';
            }
        }

        // Function to change the audio source
        function changeAudio() {
            const selectedAudio = audioSelect.value;
            backgroundAudio.src = selectedAudio;

            // If the audio is already playing, play the new track immediately
            if (!backgroundAudio.paused) {
                backgroundAudio.play().catch(error => {
                    console.error('Audio playback failed:', error);
                    alert('Error playing audio. Please interact with the page first.');
                });
            }
        }

        // Timer adjustment functions
        function decreaseTime() {
            if (minutes >= 5) {
                minutes -= 5;
                updateDisplay();
            } else if (minutes > 0) {
                minutes = 0;
                updateDisplay();
            }
        }

        function increaseTime() {
            minutes += 5;
            updateDisplay();
        }

        // Event listener for the dropdown change
        audioSelect.addEventListener('change', changeAudio);

        // Event listener for background changer button
        backgroundChanger.addEventListener('click', changeBackground);

        // Collapsible functionality
        document.querySelectorAll('.collapsible-header').forEach(header => {
            header.addEventListener('click', function () {
                const section = this.closest('.collapsible-section');
                section.classList.toggle('collapsed');
            });
        });

        // Event Listeners
        addTaskButton.addEventListener('click', addTask);
        newTaskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || (e.ctrlKey && e.key === 'Enter')) {
                addTask();
            }
        });
        toggleTimerButton.addEventListener('click', toggleTimer);
        resetButton.addEventListener('click', resetTimer);
        toggleMusicButton.addEventListener('click', toggleMusic);
        decreaseTimeButton.addEventListener('click', decreaseTime);
        increaseTimeButton.addEventListener('click', increaseTime);
    </script>
</body>

    document.getElementById('current-year').textContent = new Date().getFullYear();
