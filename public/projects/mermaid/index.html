  <body>
    <div class="container">
      <header class="app-header">
        <h1>
          <svg
            width="28"
            height="28"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"
            />
          </svg>
          Mermaid Diagram Studio
        </h1>
        <span>by Dr. Ankit Deshmukh</span>
      </header>

      <div class="grid">
        <!-- Editor Section -->
        <section class="section editor-section">
          <h2>📝 Code Editor</h2>
          <div class="controls">
            <label for="theme-select">Theme:</label>
            <select id="theme-select">
              <option value="neutral">Neutral</option>
              <option value="forest">Forest</option>
              <option value="dark">Dark</option>
              <option value="default">Default</option>
            </select>
            <button id="preview-btn">Preview</button>
          </div>
          <textarea id="editor" spellcheck="false">
graph TD
A[Start] --> B{Decision}
B -->|Yes| C[Action 1]
B -->|No| D[Action 2]
C --> E[End]
D --> E</textarea
          >
        </section>

        <!-- Preview Section -->
        <section class="section preview-section">
          <h2>🖼️ Preview</h2>
          <div class="controls">
            <label for="res-factor-select">PNG Scale:</label>
            <select id="res-factor-select">
              <option value="1">1x</option>
              <option value="2">2x</option>
              <option value="3" selected>3x</option>
              <option value="4">4x</option>
              <option value="5">5x</option>
              <option value="6">6x</option>
            </select>
            <button id="export-svg-btn">Export SVG</button>
            <button id="export-png-btn">Export PNG</button>
          </div>
          <div id="preview"></div>
        </section>
      </div>

      <footer class="site-footer">
