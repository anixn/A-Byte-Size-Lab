    />
    <meta
      name="description"
      content="Discover calm and happiness with Ankit Deshmukh's Pomodoro Timer, a Zen-inspired tool for focus and peace. Enhance productivity, practice meditation, and enjoy soothing soundscapes like Cosmic Hymn and Relaxing Rain. Cultivate mindfulness and inner tranquility in an attention-hungry world."
    />

    <meta property="og:title" content="Zen Pomodoro Timer" />
    <meta name="author" content="Dr. Ankit Deshmukh" />
    <link rel="canonical" href="https://ankitdeshmukh.com/projects/pomodoro/" />

    <!-- Favicon -->
    <link rel="icon" href="logo.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="logo.png" type="image/png" />

    <!-- Fonts -->
    <link

      href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Background changer button -->
    <!-- <button id="background-changer" title="Change background">
        <span class="bg-icon">✨</span>
    </button> -->

    <button id="background-changer" title="Change background">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-sparkles-icon lucide-sparkles"
      >
        <path
          d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"
        />
        <path d="M20 2v4" />
        <path d="M22 4h-4" />
        <circle cx="4" cy="20" r="2" />
      </svg>
    </button>

    <div class="container">
      <!-- HEADER -->
      <header class="app-header">
        <h1>
          <svg
            width="26"
            height="26"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          Zen Pomodoro Timer
        </h1>
        <!-- <span>by Dr. Ankit Deshmukh</span> -->
      </header>

      <!-- MAIN CARD -->
      <div id="app">
        <!-- Timer -->
        <div id="timer-container">
          <button
            id="decrease-time"
            class="timer-adjust-btn"
            aria-label="Decrease time by 5 minutes"
          >
            −5
          </button>
          <div id="timer">
            <span id="minutes">25</span>:<span id="seconds">00</span>
          </div>
          <button
            id="increase-time"
            class="timer-adjust-btn"
            aria-label="Increase time by 5 minutes"
          >
            +5
          </button>
        </div>

        <!-- Buttons -->
        <div class="button-group">
          <button id="toggle-timer">Start</button>
          <button id="reset">Reset</button>
          <button id="toggle-music">Play Music</button>
        </div>

        <!-- Audio selection -->
        <div class="audio-controls">
          <select id="audio-select">
            <option
              value="/audio/background.opus"
              style="background-color: #2a2b2e"
            >
              Cosmic Hymn
            </option>
            <option
              value="/audio/background2.opus"
              style="background-color: #2a2b2e"
            >
              Muse
            </option>
            <option
              value="/audio/background3.opus"
              style="background-color: #2a2b2e"
            >
              Burble
            </option>
            <option
              value="/audio/background4.opus"
              style="background-color: #2a2b2e"
            >
              ADHD Focus
            </option>
            <option
              value="/audio/background5.opus"
              style="background-color: #2a2b2e"
            >
              BiNural Beats
            </option>
          </select>
        </div>

        <audio
          id="background-audio"
          src="/audio/background.opus"
          type="audio/ogg; codecs=opus"
          loop
        ></audio>
        <div id="alerts"></div>
        <div id="pomodoro-count">Pomodoros Completed: 0</div>

        <!-- Current Task -->
        <div class="collapsible-section collapsed">
          <h4 class="collapsible-header">Current Task</h4>
          <div class="collapsible-content">
            <div class="current-task" id="current-task">
              Select a task from tasklist!
            </div>
          </div>
        </div>

        <!-- To-Do List -->
        <div class="collapsible-section collapsed">
          <h4 class="collapsible-header">To-Do List</h4>
          <div class="collapsible-content">
            <div
              style="
                display: flex;
                gap: 0.5rem;
                flex-wrap: wrap;
                margin: 0.4rem 0;
              "
            >
              <input
                type="text"
                id="new-task"
                placeholder="Add a new task..."
                style="flex: 1; min-width: 150px"
              />
              <button
                id="add-task"
                style="
                  padding: 0.4rem 1rem;
                  border-radius: var(--radius);
                  border: 1px solid var(--border);
                  background: var(--card-hover);
                  color: var(--text);
                  cursor: pointer;
                "
              >
                Add Task
              </button>
            </div>
            <ol id="to-do-list"></ol>
          </div>
        </div>
      </div>
      <!-- end #app -->

      <!-- FOOTER -->
      <footer class="site-footer">
        <div class="footer-left">
          <span>&copy; 2025 Ankit Deshmukh</span>
        </div>
        <!-- <span style="color: var(--border)">|</span> -->
        <div class="footer-left">
          <a href="https://ankitdeshmukh.com/projects/mermaid/" target="_blank"
            >Mermaid Studio</a
          >
          <span style="color: var(--border)">|</span>
          <a
            href="https://ankitdeshmukh.com/projects/colorpicker/"
            target="_blank"
            >Chromatica Pro</a
          >
          <span style="color: var(--border)">|</span>
          <a
            href="https://ankitdeshmukh.com/projects/pomodorowriter/"
            target="_blank"
            >Focused Writer</a
          >
        </div>
      </footer>
    </div>
    <!-- end .container -->

    <!-- External JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
